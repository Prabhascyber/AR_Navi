<!DOCTYPE html>
<html>
<head>
    <title>AR Indoor Navigation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial;
        }

        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div id="info">AR Navigation — Point camera forward</div>

<!-- ✅ MODULE SCRIPT (IMPORTANT CHANGE) -->
<script type="module">

// ============================
// IMPORT THREE + GLTFLOADER
// ============================

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';

import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

let scene, camera, renderer, arrow;

// ============================
// SCENE
// ============================

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

renderer = new THREE.WebGLRenderer({
    alpha: true,
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ============================
// LIGHT
// ============================

const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
scene.add(light);

// ============================
// LOAD GLTF MODEL
// ============================

const loader = new GLTFLoader();

loader.load(
    './models/arrow/scene.gltf',   // ✅ path

    (gltf) => {

        arrow = gltf.scene;

        arrow.scale.set(0.4, 0.4, 0.4);
        arrow.position.set(0, 0, -2);
        arrow.rotation.x = Math.PI / 2;

        scene.add(arrow);

        console.log("Arrow Loaded ✅");
    },

    undefined,

    (error) => {
        console.error("Model error:", error);
    }
);

// ============================
// CAMERA (AR BACKGROUND)
// ============================

navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
})
.then(stream => {

    const video = document.createElement("video");
    video.srcObject = stream;
    video.setAttribute("playsinline", true);
    video.play();

    const texture = new THREE.VideoTexture(video);
    scene.background = texture;

})
.catch(err => {
    alert("Camera permission required");
    console.error(err);
});

// ============================
// ANIMATION
// ============================

function animate() {

    requestAnimationFrame(animate);

    if (arrow) {
        arrow.rotation.z += 0.01;
    }

    renderer.render(scene, camera);
}

animate();

// ============================
// RESPONSIVE
// ============================

window.addEventListener("resize", () => {

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>

</body>
</html>
